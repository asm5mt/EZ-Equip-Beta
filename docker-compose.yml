services:
  postgres:
    image: postgres:16-alpine
    container_name: ez-equip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ez_equip
      POSTGRES_PASSWORD: ez_equip
      POSTGRES_DB: ez_equip
    volumes:
      - ez_equip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ez_equip -d ez_equip"]
      interval: 5s
      timeout: 5s
      retries: 10

  ez-equip:
    build: .
    image: asm5mt/ez-equip-beta:latest
    container_name: ez-equip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      SESSION_SECRET: ajklaf8a9ds8h359284h915h14u5h1i
      DATABASE_URL: postgres://ez_equip:ez_equip@postgres:5432/ez_equip
      # One-time bootstrap: applied to the first system-admin account that still
      # has no password, then never touched again. Change this, then remove or
      # rotate it once you've logged in and set a real password via the UI.
      ADMIN_BOOTSTRAP_PASSWORD: change-me-please

volumes:
  ez_equip_pgdata:
